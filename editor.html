<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic Resume Editor - MakeMyResume</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <style>
        .watermark-layer {
            position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
            pointer-events: none; opacity: 0.15; font-size: 32px; font-weight: 900; color: #dc2626;
            transform: rotate(-30deg); z-index: 20; white-space: nowrap;
        }
    </style>
</head>
<body class="bg-slate-100 font-sans h-screen flex flex-col">

    <!-- TOP TOOLBAR (COLOR, FONT SIZE & TEMPLATE CONTROLS) -->
    <header class="bg-white border-b px-6 py-2 flex flex-wrap justify-between items-center gap-3">
        <div class="flex items-center gap-2 cursor-pointer" onclick="window.location.href='index.html'">
            <span class="bg-red-600 text-white p-1 rounded"><i class="fa-solid fa-file-invoice"></i></span>
            <span class="font-bold text-slate-900">MakeMy<span class="text-red-600">Resume</span></span>
        </div>

        <!-- CUSTOMIZERS -->
        <div class="flex flex-wrap items-center gap-3 text-xs">
            <div>
                <label class="font-bold text-slate-600 mr-1">Color Theme:</label>
                <input type="color" id="themeColor" value="#2563eb" onchange="applyCustomStyles()" class="w-6 h-6 rounded cursor-pointer align-middle">
            </div>
            <div>
                <label class="font-bold text-slate-600 mr-1">Font Size:</label>
                <select id="fontSizeSelect" onchange="applyCustomStyles()" class="border rounded p-1 font-semibold">
                    <option value="12px">Small (12px)</option>
                    <option value="14px" selected>Normal (14px)</option>
                    <option value="16px">Large (16px)</option>
                </select>
            </div>
            <div>
                <label class="font-bold text-slate-600 mr-1">Font Style:</label>
                <select id="fontStyleSelect" onchange="applyCustomStyles()" class="border rounded p-1 font-semibold">
                    <option value="sans-serif">Modern Sans</option>
                    <option value="serif">Executive Serif</option>
                    <option value="monospace">Tech Mono</option>
                </select>
            </div>
        </div>

        <!-- ACTION DOWNLOAD BUTTONS -->
        <div class="flex items-center gap-2">
            <button onclick="downloadPDF(false)" class="bg-slate-700 hover:bg-slate-800 text-white text-xs font-bold px-3 py-2 rounded">
                <i class="fa-solid fa-download mr-1"></i> Free Download (Watermark)
            </button>
            <button onclick="downloadPDF(true)" class="bg-emerald-600 hover:bg-emerald-700 text-white text-xs font-bold px-3 py-2 rounded shadow">
                <i class="fa-solid fa-crown mr-1"></i> Pro Download (<span id="btnPriceDisplay">₹5</span>)
            </button>
        </div>
    </header>

    <!-- MAIN EDITOR WORKSPACE -->
    <div class="flex-1 flex overflow-hidden">
        
        <!-- LEFT INPUT FORM PANEL -->
        <div class="w-full md:w-1/2 bg-white p-6 overflow-y-auto border-r space-y-4 text-xs">
            <h2 class="font-bold text-slate-800 text-sm border-b pb-2"><i class="fa-solid fa-pen text-red-600 mr-1"></i> Resume & Profile Details</h2>

            <!-- Photo Upload Option -->
            <div class="bg-slate-50 p-3 rounded border">
                <label class="block font-bold text-slate-700 mb-1">Profile Photo (Optional)</label>
                <input type="file" id="photoInput" accept="image/*" onchange="previewPhoto(event)" class="w-full text-slate-500">
            </div>

            <div>
                <label class="block font-bold text-slate-700 mb-1">Full Name</label>
                <input type="text" id="inName" oninput="render()" class="w-full border p-2 rounded">
            </div>
            <div class="grid grid-cols-2 gap-2">
                <div>
                    <label class="block font-bold text-slate-700 mb-1">Email</label>
                    <input type="email" id="inEmail" oninput="render()" class="w-full border p-2 rounded">
                </div>
                <div>
                    <label class="block font-bold text-slate-700 mb-1">Mobile</label>
                    <input type="text" id="inPhone" oninput="render()" class="w-full border p-2 rounded">
                </div>
            </div>
            <div class="grid grid-cols-2 gap-2">
                <div>
                    <label class="block font-bold text-slate-700 mb-1">Country / District</label>
                    <input type="text" id="inLocation" oninput="render()" class="w-full border p-2 rounded">
                </div>
                <div>
                    <label class="block font-bold text-slate-700 mb-1">Address</label>
                    <input type="text" id="inAddress" oninput="render()" class="w-full border p-2 rounded">
                </div>
            </div>
            <div>
                <label class="block font-bold text-slate-700 mb-1">Education Details</label>
                <textarea id="inEdu" rows="2" oninput="render()" class="w-full border p-2 rounded"></textarea>
            </div>
            <div>
                <label class="block font-bold text-slate-700 mb-1">Work Experience</label>
                <textarea id="inExp" rows="3" oninput="render()" class="w-full border p-2 rounded"></textarea>
            </div>
            <div>
                <label class="block font-bold text-slate-700 mb-1">Job Application / Cover Request Letter (Auto Generated)</label>
                <textarea id="inCover" rows="4" oninput="render()" class="w-full border p-2 rounded bg-amber-50"></textarea>
            </div>
        </div>

        <!-- RIGHT PREVIEW CANVAS -->
        <div class="hidden md:flex flex-1 bg-slate-200 p-6 overflow-y-auto justify-center">
            <div id="resumeCanvas" class="bg-white w-[210mm] min-h-[297mm] p-8 shadow-2xl rounded relative">
                
                <!-- WATERMARK LAYER -->
                <div id="watermark" class="watermark-layer">
                    FREE WATERMARK - MAKEMYRESUME
                </div>

                <!-- RESUME HEADER & PHOTO -->
                <div class="flex justify-between items-center border-b-2 pb-4 mb-4" id="headerBorder">
                    <div>
                        <h1 id="outName" class="text-2xl font-extrabold">Rahul Sharma</h1>
                        <p id="outContact" class="text-xs text-slate-600 mt-1">Email | Phone | Location</p>
                        <p id="outAddress" class="text-[11px] text-slate-500"></p>
                    </div>
                    <div id="photoContainer" class="hidden">
                        <img id="outPhoto" src="" class="w-20 h-20 object-cover rounded-full border-2 border-slate-300">
                    </div>
                </div>

                <!-- EDUCATION -->
                <div class="mb-4">
                    <h3 class="font-bold text-xs uppercase tracking-wider mb-1" id="titleEdu">Education</h3>
                    <p id="outEdu" class="text-xs text-slate-700 whitespace-pre-line"></p>
                </div>

                <!-- WORK EXPERIENCE -->
                <div class="mb-4">
                    <h3 class="font-bold text-xs uppercase tracking-wider mb-1" id="titleExp">Work Experience</h3>
                    <p id="outExp" class="text-xs text-slate-700 whitespace-pre-line"></p>
                </div>

                <!-- AUTO JOB REQUEST LETTER SECTION -->
                <div class="mt-6 pt-4 border-t">
                    <h3 class="font-bold text-xs uppercase tracking-wider mb-1" id="titleCover">Application / Request Letter</h3>
                    <p id="outCover" class="text-xs text-slate-600 italic leading-relaxed whitespace-pre-line"></p>
                </div>

            </div>
        </div>
    </div>

    <script>
        let currentPrice = localStorage.getItem('app_download_price') || "5";

        window.addEventListener('DOMContentLoaded', () => {
            document.getElementById('btnPriceDisplay').innerText = "₹" + currentPrice;
            loadProfileData();
            render();
        });

        // Load profile from Registration if exists
        function loadProfileData() {
            const profile = JSON.parse(localStorage.getItem('user_full_profile'));
            if(profile) {
                document.getElementById('inName').value = profile.name || '';
                document.getElementById('inEmail').value = profile.email || '';
                document.getElementById('inPhone').value = profile.phone || '';
                document.getElementById('inLocation').value = (profile.district || '') + ', ' + (profile.country || '');
                document.getElementById('inAddress').value = profile.address || '';
                document.getElementById('inEdu').value = profile.edu || '';
                document.getElementById('inExp').value = profile.exp || '';

                // Auto Generate Request Letter
                document.getElementById('inCover').value = 
`To,
The Hiring Manager,
Subject: Application for Job Opportunity

Respected Sir/Madam,
I am writing to express my interest in joining your esteemed organization. With my educational background in ${profile.edu || 'my field'} and work experience in ${profile.exp || 'relevant roles'}, I am confident in my ability to contribute effectively to your team.

Thank you for considering my application.

Sincerely,
${profile.name}`;
            }
        }

        // Preview Photo
        function previewPhoto(event) {
            const reader = new FileReader();
            reader.onload = function() {
                const outPhoto = document.getElementById('outPhoto');
                outPhoto.src = reader.result;
                document.getElementById('photoContainer').classList.remove('hidden');
            }
            if(event.target.files[0]) reader.readAsDataURL(event.target.files[0]);
        }

        function applyCustomStyles() {
            const color = document.getElementById('themeColor').value;
            const size = document.getElementById('fontSizeSelect').value;
            const font = document.getElementById('fontStyleSelect').value;

            const canvas = document.getElementById('resumeCanvas');
            canvas.style.fontSize = size;
            canvas.style.fontFamily = font;

            document.getElementById('outName').style.color = color;
            document.getElementById('headerBorder').style.borderColor = color;
            document.getElementById('titleEdu').style.color = color;
            document.getElementById('titleExp').style.color = color;
            document.getElementById('titleCover').style.color = color;
        }

        function render() {
            document.getElementById('outName').innerText = document.getElementById('inName').value || 'Your Name';
            document.getElementById('outContact').innerText = `${document.getElementById('inEmail').value} | ${document.getElementById('inPhone').value} | ${document.getElementById('inLocation').value}`;
            document.getElementById('outAddress').innerText = document.getElementById('inAddress').value;
            document.getElementById('outEdu').innerText = document.getElementById('inEdu').value;
            document.getElementById('outExp').innerText = document.getElementById('inExp').value;
            document.getElementById('outCover').innerText = document.getElementById('inCover').value;
            applyCustomStyles();
        }

        function downloadPDF(isPaid) {
            const profile = JSON.parse(localStorage.getItem('user_full_profile'));

            if(isPaid) {
                // Must be registered for Paid Clean Download
                if(!profile || !profile.isRegistered) {
                    alert("Clean PDF (Without Watermark) download karne ke liye pehle Registration karein!");
                    window.location.href = "index.html";
                    return;
                }

                let pay = confirm(`Price: ₹${currentPrice} for Pro Watermark-Free PDF. Proceed to Download?`);
                if(pay) {
                    document.getElementById('watermark').style.display = 'none';
                    generatePDF('pro_resume.pdf');
                }
            } else {
                // Free Download with Watermark
                document.getElementById('watermark').style.display = 'flex';
                generatePDF('free_draft_resume.pdf');
            }
        }

        function generatePDF(filename) {
            const element = document.getElementById('resumeCanvas');
            const opt = { margin: 0, filename: filename, html2canvas: { scale: 2 }, jsPDF: { unit: 'mm', format: 'a4' } };
            html2pdf().set(opt).from(element).save();
        }
    </script>
</body>
</html>
