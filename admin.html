<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MakeMyResume - Admin Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen p-6 font-sans">
    <div class="max-w-6xl mx-auto space-y-6">
        
        <div class="flex justify-between items-center border-b border-slate-800 pb-4">
            <div>
                <h1 class="text-xl font-bold text-white"><i class="fa-solid fa-shield-halved text-red-500 mr-2"></i>Admin Management Console</h1>
                <p class="text-xs text-slate-400">View registered users and template activity logs</p>
            </div>
            <a href="index.html" class="bg-red-600 text-xs font-bold px-4 py-2 rounded text-white">Back to Live Website</a>
        </div>

        <div class="bg-slate-800 rounded-xl p-5 border border-slate-700">
            <h3 class="font-bold text-sm mb-4 text-slate-200">Registered Users Database</h3>
            <div class="overflow-x-auto">
                <table class="w-full text-left text-xs text-slate-300">
                    <thead class="bg-slate-700 text-slate-100 uppercase text-[10px]">
                        <tr>
                            <th class="p-3">Name</th>
                            <th class="p-3">Email & Phone</th>
                            <th class="p-3">Location</th>
                            <th class="p-3">Templates Used</th>
                            <th class="p-3">PDF Downloads</th>
                        </tr>
                    </thead>
                    <tbody id="adminUsersTable" class="divide-y divide-slate-700">
                        <!-- Dynamic Users -->
                    </tbody>
                </table>
            </div>
        </div>

    </div>

    <script>
        window.addEventListener('DOMContentLoaded', () => {
            const users = JSON.parse(localStorage.getItem('registered_users_db')) || [];
            const tbody = document.getElementById('adminUsersTable');
            tbody.innerHTML = '';

            if(users.length === 0) {
                tbody.innerHTML = `<tr><td colspan="5" class="p-4 text-center text-slate-500">Koi user registered nahi hai.</td></tr>`;
                return;
            }

            users.forEach(u => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td class="p-3 font-bold text-white">${u.name}</td>
                    <td class="p-3">${u.email}<br><span class="text-slate-400 text-[10px]">${u.phone}</span></td>
                    <td class="p-3">${u.district}, ${u.country}</td>
                    <td class="p-3 font-bold text-red-400">${u.history ? u.history.length : 0}</td>
                    <td class="p-3 font-bold text-emerald-400">${u.downloadsCount || 0}</td>
                `;
                tbody.appendChild(tr);
            });
        });
    </script>
</body>
</html>
