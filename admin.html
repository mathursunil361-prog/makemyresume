<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - MakeMyResume</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
</head>
<body class="bg-slate-100 font-sans antialiased">

    <!-- ADMIN NAVBAR -->
    <header class="bg-slate-900 text-white px-6 py-4 flex justify-between items-center shadow-lg">
        <div class="flex items-center gap-2">
            <span class="bg-red-600 text-white p-1.5 rounded"><i class="fa-solid fa-user-shield"></i></span>
            <span class="font-bold text-lg">MakeMyResume <span class="text-red-500 text-xs uppercase px-2 py-0.5 bg-red-950 rounded border border-red-800">Admin Panel</span></span>
        </div>
        <button onclick="logoutAdmin()" class="text-xs bg-slate-800 hover:bg-slate-700 border border-slate-700 px-3 py-1.5 rounded font-semibold text-slate-300">
            <i class="fa-solid fa-right-from-bracket"></i> Logout
        </button>
    </header>

    <div class="max-w-7xl mx-auto p-6">
        
        <!-- STATS CARDS -->
        <div class="grid grid-cols-1 sm:grid-cols-3 gap-6 mb-8">
            <div class="bg-white p-5 rounded-xl border border-slate-200 shadow-sm flex items-center justify-between">
                <div>
                    <p class="text-xs font-bold text-slate-400 uppercase">Total Users</p>
                    <h3 id="statTotalUsers" class="text-2xl font-extrabold text-slate-800 mt-1">0</h3>
                </div>
                <div class="w-10 h-10 bg-blue-50 text-blue-600 rounded-lg flex items-center justify-center text-lg"><i class="fa-solid fa-users"></i></div>
            </div>
            <div class="bg-white p-5 rounded-xl border border-slate-200 shadow-sm flex items-center justify-between">
                <div>
                    <p class="text-xs font-bold text-slate-400 uppercase">Total Revenue</p>
                    <h3 id="statRevenue" class="text-2xl font-extrabold text-emerald-600 mt-1">₹0</h3>
                </div>
                <div class="w-10 h-10 bg-emerald-50 text-emerald-600 rounded-lg flex items-center justify-center text-lg"><i class="fa-solid fa-indian-rupee-sign"></i></div>
            </div>
            <div class="bg-white p-5 rounded-xl border border-slate-200 shadow-sm flex items-center justify-between">
                <div>
                    <p class="text-xs font-bold text-slate-400 uppercase">PDF Downloads</p>
                    <h3 id="statDownloads" class="text-2xl font-extrabold text-purple-600 mt-1">0</h3>
                </div>
                <div class="w-10 h-10 bg-purple-50 text-purple-600 rounded-lg flex items-center justify-center text-lg"><i class="fa-solid fa-file-pdf"></i></div>
            </div>
        </div>

        <!-- USERS TABLE -->
        <div class="bg-white rounded-xl border border-slate-200 shadow-sm overflow-hidden">
            <div class="p-4 border-b border-slate-200 flex justify-between items-center bg-slate-50">
                <h2 class="font-bold text-slate-800 text-sm"><i class="fa-solid fa-database text-red-600 mr-2"></i> Registered Users Database</h2>
                <button onclick="fetchUsers()" class="text-xs text-blue-600 hover:underline font-semibold"><i class="fa-solid fa-rotate-right"></i> Refresh</button>
            </div>

            <div class="overflow-x-auto">
                <table class="w-full text-left text-xs text-slate-600">
                    <thead class="bg-slate-100 uppercase text-slate-500 border-b border-slate-200">
                        <tr>
                            <th class="p-3.5">User Name</th>
                            <th class="p-3.5">Email</th>
                            <th class="p-3.5">Joined Date</th>
                            <th class="p-3.5">Payment Status</th>
                            <th class="p-3.5 text-center">Action</th>
                        </tr>
                    </thead>
                    <tbody id="usersTableBody" class="divide-y divide-slate-100">
                        <!-- Dynamic Rows -->
                        <tr>
                            <td colspan="5" class="p-4 text-center text-slate-400">Loading user records...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        // FIREBASE CONFIGURATION (Apna Firebase credentials yahan paste karein)
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_PROJECT_ID.firebaseapp.com",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_PROJECT_ID.appspot.com",
            messagingSenderId: "YOUR_SENDER_ID",
            appId: "YOUR_APP_ID"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();

        // Check if Admin
        auth.onAuthStateChanged(user => {
            if (!user) {
                // Prompt Admin Login
                let pass = prompt("Enter Admin Password:");
                if(pass !== "admin123") { // Change this admin password
                    alert("Unauthorized Access!");
                    window.location.href = "index.html";
                } else {
                    fetchUsers();
                }
            } else {
                fetchUsers();
            }
        });

        function fetchUsers() {
            const tableBody = document.getElementById('usersTableBody');
            tableBody.innerHTML = '';

            db.collection("users").get().then((querySnapshot) => {
                let totalUsers = 0;
                let totalRevenue = 0;

                if(querySnapshot.empty) {
                    tableBody.innerHTML = '<tr><td colspan="5" class="p-4 text-center text-slate-400">No registered users found.</td></tr>';
                    return;
                }

                querySnapshot.forEach((doc) => {
                    const data = doc.data();
                    totalUsers++;
                    if(data.hasPaid) totalRevenue += 5;

                    const row = `
                        <tr class="hover:bg-slate-50">
                            <td class="p-3.5 font-bold text-slate-800">${data.name || 'N/A'}</td>
                            <td class="p-3.5">${data.email}</td>
                            <td class="p-3.5">${data.createdAt || 'Recent'}</td>
                            <td class="p-3.5">
                                ${data.hasPaid 
                                    ? '<span class="bg-emerald-100 text-emerald-700 px-2 py-0.5 rounded font-bold">Paid (₹5)</span>' 
                                    : '<span class="bg-slate-100 text-slate-500 px-2 py-0.5 rounded font-bold">Free User</span>'}
                            </td>
                            <td class="p-3.5 text-center">
                                <button onclick="deleteUser('${doc.id}')" class="text-red-500 hover:text-red-700 p-1"><i class="fa-solid fa-trash"></i></button>
                            </td>
                        </tr>
                    `;
                    tableBody.innerHTML += row;
                });

                document.getElementById('statTotalUsers').innerText = totalUsers;
                document.getElementById('statRevenue').innerText = '₹' + totalRevenue;
                document.getElementById('statDownloads').innerText = totalRevenue / 5;
            });
        }

        function deleteUser(docId) {
            if(confirm("Are you sure you want to delete this user record?")) {
                db.collection("users").doc(docId).delete().then(() => {
                    alert("User deleted!");
                    fetchUsers();
                });
            }
        }

        function logoutAdmin() {
            auth.signOut().then(() => {
                window.location.href = "index.html";
            });
        }
    </script>
</body>
</html>
