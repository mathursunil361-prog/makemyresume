<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-slate-950 font-sans p-6 text-slate-100">

    <div class="max-w-6xl mx-auto space-y-6">
        <div class="flex justify-between items-center bg-slate-900 border border-slate-800 p-4 rounded-2xl shadow">
            <h1 class="text-base font-bold text-white"><i class="fa-solid fa-shield-halved text-red-500 mr-2"></i> Admin Control Panel</h1>
            <a href="index.html" class="text-xs bg-slate-800 px-3 py-1.5 rounded-lg border border-slate-700">Back to Website</a>
        </div>

        <div class="bg-slate-900 border border-slate-800 p-5 rounded-2xl">
            <h2 class="font-bold text-sm mb-3">Set Pro PDF Download Price</h2>
            <div class="flex gap-3 max-w-xs">
                <input type="number" id="priceInput" class="bg-slate-950 border border-slate-800 p-2 rounded-lg text-sm w-full font-bold text-white">
                <button onclick="updatePrice()" class="bg-red-600 hover:bg-red-700 text-white font-bold px-4 py-2 rounded-lg text-xs">Save</button>
            </div>
        </div>

        <div class="bg-slate-900 border border-slate-800 rounded-2xl p-5">
            <h2 class="font-bold text-sm mb-4">All Registered Users Database</h2>
            <div class="overflow-x-auto">
                <table class="w-full text-left text-xs border-collapse">
                    <thead>
                        <tr class="bg-slate-950 text-slate-400 border-b border-slate-800">
                            <th class="p-3">User</th>
                            <th class="p-3">Contact Details</th>
                            <th class="p-3">Location</th>
                            <th class="p-3">Templates Used</th>
                            <th class="p-3">Pro Downloads</th>
                        </tr>
                    </thead>
                    <tbody id="adminUserTable">
                        <!-- Rows -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        window.addEventListener('DOMContentLoaded', () => {
            let pass = prompt("Enter Admin Password:");
            if(pass !== "admin123") {
                alert("Wrong Password!");
                window.location.href = "index.html";
                return;
            }

            const p = localStorage.getItem('app_download_price') || "5";
            document.getElementById('priceInput').value = p;

            loadUsers();
        });

        function updatePrice() {
            const np = document.getElementById('priceInput').value;
            if(np) {
                localStorage.setItem('app_download_price', np);
                alert("Price updated to ₹" + np);
            }
        }

        function loadUsers() {
            const users = JSON.parse(localStorage.getItem('registered_users_db')) || [];
            const tbody = document.getElementById('adminUserTable');

            if(users.length > 0) {
                tbody.innerHTML = '';
                users.forEach(u => {
                    const tr = document.createElement('tr');
                    tr.className = "border-b border-slate-800 hover:bg-slate-850";
                    tr.innerHTML = `
                        <td class="p-3 font-bold text-white">${u.name}</td>
                        <td class="p-3">${u.email}<br><span class="text-slate-400">${u.phone}</span></td>
                        <td class="p-3">${u.district}, ${u.country}</td>
                        <td class="p-3 text-red-400 font-bold">${u.history ? u.history.length : 0}</td>
                        <td class="p-3 text-emerald-400 font-bold">${u.downloadsCount || 0}</td>
                    `;
                    tbody.appendChild(tr);
                });
            } else {
                tbody.innerHTML = `<tr><td colspan="5" class="p-4 text-center text-slate-500">No Registered Users Found</td></tr>`;
            }
        }
    </script>
</body>
</html>
